# Builds the production Docker image and verifies the PPTX→PDF pipeline
# end-to-end inside it: real LibreOffice render (shapes/table/chart/fonts),
# legacy .ppt support, honest engine health — the exact image Render deploys.
name: docker-verify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t inscribed-backend:ci .

      - name: Start container and wait for boot
        run: |
          docker run -d --name app -p 10000:10000 inscribed-backend:ci
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:10000/api/health > /dev/null 2>&1; then
              echo "server is up"; exit 0
            fi
            sleep 2
          done
          echo "server did not become healthy in time"
          docker logs app
          exit 1

      - name: PPTX engine health reports LibreOffice
        run: |
          body=$(curl -fsS http://localhost:10000/api/pptx/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"'
          echo "$body" | grep -qi 'LibreOffice'

      - name: Generate test deck (shapes, table, chart, Georgia font)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          npm install adm-zip --no-save --ignore-scripts --no-audit --no-fund
          node scripts/make-test-pptx.js /tmp/render-test.pptx
          ls -la /tmp/render-test.pptx

      - name: Convert .pptx via API and validate the PDF is a real render
        run: |
          resp=$(curl -fsS -F "file=@/tmp/render-test.pptx" http://localhost:10000/api/pptx/convert)
          echo "$resp"
          stream=$(echo "$resp" | python3 -c "import sys,json;print(json.load(sys.stdin)['streamUrl'])")
          curl -fsS "http://localhost:10000$stream" -o /tmp/out.pdf
          size=$(stat -c%s /tmp/out.pdf)
          echo "PDF size: $size bytes"
          test "$size" -gt 3000                  # fallback PDFs were ~2-3 KB
          head -c 8 /tmp/out.pdf | grep -q '%PDF'
          pdfinfo /tmp/out.pdf
          # Producer must be LibreOffice (stored as UTF-16 in the PDF, so
          # check via pdfinfo rather than raw grep)
          pdfinfo /tmp/out.pdf | grep -i 'producer' | grep -qi 'libreoffice'
          ! grep -aq "PDFKit" /tmp/out.pdf        # text-only fallback must be dead

      - name: Convert legacy .ppt via API (generated by soffice in-container)
        run: |
          docker cp /tmp/render-test.pptx app:/tmp/render-test.pptx
          docker exec app soffice -env:UserInstallation=file:///tmp/lo-ci-profile \
            --headless --invisible --nodefault --norestore --nolockcheck --nologo \
            --convert-to ppt --outdir /tmp /tmp/render-test.pptx
          docker cp app:/tmp/render-test.ppt /tmp/render-test.ppt
          resp=$(curl -fsS -F "file=@/tmp/render-test.ppt" http://localhost:10000/api/pptx/convert)
          echo "$resp"
          stream=$(echo "$resp" | python3 -c "import sys,json;print(json.load(sys.stdin)['streamUrl'])")
          curl -fsS "http://localhost:10000$stream" -o /tmp/out-legacy.pdf
          test "$(stat -c%s /tmp/out-legacy.pdf)" -gt 3000
          pdfinfo /tmp/out-legacy.pdf | grep -i 'producer' | grep -qi 'libreoffice'

      - name: Rasterize result for visual inspection (artifact)
        run: |
          pdftoppm -png -r 80 /tmp/out.pdf /tmp/slide
          ls -la /tmp/slide*.png

      - name: Upload rendered PDFs + PNGs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-output
          path: |
            /tmp/render-test.pptx
            /tmp/out.pdf
            /tmp/out-legacy.pdf
            /tmp/slide*.png

      - name: Container logs
        if: always()
        run: docker logs app
